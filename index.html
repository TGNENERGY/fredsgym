<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2a16"/>
      <stop offset="1" stop-color="#0d1108"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c7d18f"/>
      <stop offset="1" stop-color="#8fb63c"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- rounded tile -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="106" fill="none" stroke="#4A5A2B" stroke-width="4"/>

  <!-- subtle chevron field (military nod) -->
  <g opacity="0.10" fill="none" stroke="#8fb63c" stroke-width="10">
    <path d="M 96 150 L 256 60 L 416 150"/>
    <path d="M 96 200 L 256 110 L 416 200"/>
  </g>

  <!-- dumbbell -->
  <g filter="url(#sh)">
    <!-- bar -->
    <rect x="150" y="292" width="212" height="30" rx="15" fill="url(#steel)"/>
    <!-- left plates -->
    <rect x="120" y="258" width="34" height="98" rx="14" fill="url(#steel)"/>
    <rect x="92"  y="278" width="30" height="58" rx="12" fill="#6B8036"/>
    <!-- right plates -->
    <rect x="358" y="258" width="34" height="98" rx="14" fill="url(#steel)"/>
    <rect x="390" y="278" width="30" height="58" rx="12" fill="#6B8036"/>
  </g>

  <!-- FG monogram -->
  <text x="256" y="235" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="150" fill="url(#steel)" letter-spacing="-6">FG</text>

  <!-- wordmark -->
  <text x="256" y="410" text-anchor="middle"
        font-family="Arial, sans-serif" font-weight="800"
        font-size="52" fill="#C7BFA4" letter-spacing="6">FREDS</text>
  <text x="256" y="458" text-anchor="middle"
        font-family="Arial, sans-serif" font-weight="800"
        font-size="52" fill="#8fb63c" letter-spacing="14">GYM</text>
</svg>
