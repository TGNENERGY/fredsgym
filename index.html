<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#12160F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="FredsGym" />
<title>FredsGym</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  :root{--bg:#12160F;--panel:#1B2114;--olive:#4A5A2B;--oliveL:#6B8036;--sand:#C7BFA4;--work:#8FB63C;--rest:#3D6E8C;--prep:#B8912E;--ink:#E6E4D6;--faint:#7C8168;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--ink);font-family:ui-monospace,'SF Mono',Menlo,monospace;overscroll-behavior:none;}
  body{min-height:100vh;min-height:100dvh;user-select:none;}
  .wrap{max-width:440px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 10px) 14px calc(env(safe-area-inset-bottom) + 16px);display:flex;flex-direction:column;min-height:100dvh;}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  h1{font-size:18px;letter-spacing:4px;text-transform:uppercase;color:var(--sand);}
  h1 span{color:var(--work);}
  .streak{font-size:13px;color:var(--work);font-weight:700;}
  .seg{display:flex;gap:5px;background:#000;border:1px solid var(--olive);border-radius:10px;padding:4px;margin-bottom:8px;}
  .seg button{flex:1;background:transparent;color:var(--faint);border:none;border-radius:7px;padding:9px 4px;font:inherit;font-size:11.5px;letter-spacing:.5px;cursor:pointer;text-transform:uppercase;}
  .seg button.on{background:var(--olive);color:var(--ink);font-weight:700;}
  .seg.diff button.on{background:var(--oliveL);color:#0d0f0a;}
  .row2{display:flex;gap:8px;}
  .row2 .seg{flex:1;}
  .dialwrap{position:relative;width:270px;height:270px;margin:8px auto 4px;}
  .dc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .phase{font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:700;}
  .time{font-size:60px;font-weight:700;line-height:1.05;}
  .exname{font-size:15px;text-align:center;color:var(--sand);max-width:210px;min-height:38px;padding:0 6px;}
  .cue{font-size:11.5px;color:var(--faint);text-align:center;max-width:320px;margin:6px auto 0;min-height:28px;line-height:1.35;}
  .next{font-size:11px;text-align:center;color:var(--faint);letter-spacing:.5px;text-transform:uppercase;margin-top:6px;min-height:15px;}
  .bar{width:100%;height:5px;background:#000;border:1px solid var(--olive);border-radius:3px;overflow:hidden;margin:6px 0;}
  .bar>div{height:100%;background:linear-gradient(90deg,var(--oliveL),var(--work));transition:width .4s linear;}
  .controls{display:flex;gap:10px;align-items:center;justify-content:center;margin-top:12px;}
  .btn{background:transparent;color:var(--sand);border:1px solid var(--olive);border-radius:9px;padding:11px 16px;font:inherit;font-size:15px;letter-spacing:.5px;cursor:pointer;}
  .btn:active{transform:translateY(1px);}
  .main{border:none;color:#0d0f0a;border-radius:11px;padding:15px 30px;font-size:17px;font-weight:700;letter-spacing:1px;min-width:150px;box-shadow:0 4px 0 rgba(0,0,0,.4);cursor:pointer;}
  .main:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.4);}
  .reset{display:block;margin:9px auto 0;opacity:.8;font-size:13px;}
  .foot{margin-top:auto;padding-top:12px;font-size:10.5px;color:var(--faint);letter-spacing:1px;text-transform:uppercase;text-align:center;}
  .instal{margin-top:8px;text-align:center;}
  #installBtn{display:none;background:var(--work);color:#0d0f0a;border:none;border-radius:9px;padding:10px 16px;font:inherit;font-weight:700;cursor:pointer;}
  #rotate{position:fixed;inset:0;background:var(--bg);z-index:99;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  @media (orientation:landscape) and (max-height:500px){#rotate{display:flex;}}

  .exrow{display:flex;align-items:center;justify-content:center;gap:8px;}
  .info-btn{width:22px;height:22px;min-width:22px;border-radius:50%;border:1px solid var(--olive);background:transparent;color:var(--sand);font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-family:serif;font-style:italic;}
  .info-btn:active{transform:scale(.9);}
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:center;justify-content:center;padding:18px;}
  #modal.show{display:flex;}
  .sheet{background:var(--panel);border:1px solid var(--olive);border-radius:16px;max-width:400px;width:100%;max-height:88vh;overflow-y:auto;padding:18px;}
  .sheet h3{color:var(--work);font-size:17px;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  .sheet .diag{width:100%;height:130px;background:#000;border-radius:10px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;}
  .sheet p{font-size:13px;line-height:1.5;margin-bottom:8px;color:var(--ink);}
  .sheet .lbl{color:var(--oliveL);font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:1px;}
  .sheet .yt{display:block;text-align:center;background:var(--work);color:#0d0f0a;font-weight:700;padding:12px;border-radius:10px;text-decoration:none;margin-top:12px;font-size:14px;}
  .sheet .close{display:block;width:100%;margin-top:8px;background:transparent;border:1px solid var(--olive);color:var(--sand);border-radius:10px;padding:11px;font:inherit;cursor:pointer;}

  .plan{margin-top:14px;background:var(--panel);border:1px solid var(--olive);border-radius:12px;padding:12px;}
  .plan .lbl2{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:6px;display:block;}
  .setlbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--oliveL);margin:10px 0 4px;font-weight:700;}
  .plan-item{display:flex;justify-content:space-between;align-items:center;padding:7px 4px;border-bottom:1px solid #2a3320;font-size:12.5px;gap:8px;}
  .plan-item:last-child{border-bottom:none;}
  .plan-item .nm{color:var(--sand);flex:1;text-align:left;}
  .plan-item.active{background:#2a3320;border-radius:7px;}
  .plan-item.active .nm{color:var(--work);font-weight:700;}
  .plan-item .pi{width:20px;height:20px;min-width:20px;border-radius:50%;border:1px solid var(--olive);background:transparent;color:var(--sand);font-size:11px;font-family:serif;font-style:italic;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
  .plan-item .num{color:var(--faint);font-size:11px;min-width:16px;text-align:left;}
</style>
</head>
<body>
<div id="rotate"><div style="font-size:48px;margin-bottom:14px;">📱↻</div><div style="letter-spacing:2px;text-transform:uppercase;color:var(--sand);">Rotate to portrait</div></div>
<div class="wrap">
  <div class="top"><h1>FREDS<span>GYM</span></h1><div class="streak" id="streak">0🔥</div></div>
  <div class="seg" id="daySeg"></div>
  <div class="row2"><div class="seg diff" id="diffSeg"><button data-d="0">Easy</button><button data-d="1">Standard</button><button data-d="2">Hard</button></div></div>
  <div class="row2">
    <div class="seg" id="lenSeg"><button data-len="15">15 min</button><button data-len="30">30 min</button></div>
    <div class="seg" id="equipSeg"><button data-e="bw">Body</button><button data-e="band">Bands</button><button data-e="bar">Bar</button></div>
  </div>
  <div class="dialwrap">
    <svg width="270" height="270" viewBox="0 0 270 270">
      <circle cx="135" cy="135" r="118" fill="none" stroke="#000" stroke-width="16" opacity=".5"/>
      <circle id="ring" cx="135" cy="135" r="118" fill="none" stroke="var(--work)" stroke-width="16" stroke-linecap="round" transform="rotate(-90 135 135)"/>
    </svg>
    <div class="dc"><div class="phase" id="phase">Standby</div><div class="time" id="time">0:10</div><div class="exname" id="exname">Get ready</div></div>
  </div>
  <div class="cue" id="cue"></div>
  <div class="next" id="next"></div>
  <div class="bar"><div id="overall"></div></div>
  <div class="controls"><button class="btn" id="prev">‹</button><button class="main" id="startBtn">▶ Start</button><button class="btn" id="skip">›</button></div>
  <button class="btn reset" id="reset">↺ Reset</button>
  <div class="foot" id="foot"></div>
  <div class="plan"><span class="lbl2">Session plan</span><div id="planList"></div></div>
  <div class="instal"><button id="installBtn">⬇ Install FredsGym</button></div>
</div>
<div id="modal"><div class="sheet" id="sheet"></div></div>

let dfd=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dfd=e;const b=$("installBtn");b.style.display="inline-block";b.onclick=async()=>{b.style.display="none";dfd.prompt();await dfd.userChoice;dfd=null;};});
window.diagram=function(key){var f=FIGMAP[key];return (f&&FIG[f])?FIG[f]:FIG['stand'];};
window.showGuide=function(key){var g=GUIDE[key];if(!g)return;
  var html='<h3>'+g.t+'</h3><div class="diag">'+window.diagram(key)+'</div>'+
    '<p><span class="lbl">Setup</span><br>'+g.setup+'</p>'+
    '<p><span class="lbl">How to</span><br>'+g.steps+'</p>'+
    '<p><span class="lbl">Form cues</span><br>'+g.cues+'</p>'+
    '<p><span class="lbl">Avoid</span><br>'+g.avoid+'</p>'+
    (g.wiki?'<a class="yt" href="'+g.wiki+'" target="_blank" rel="noopener">Read on Wikipedia</a>':'')+
    '<button class="close" onclick="hideGuide()">Close</button>';
  document.getElementById("sheet").innerHTML=html;document.getElementById("modal").classList.add("show");
  if(S.running){stop();}};
window.hideGuide=function(){document.getElementById("modal").classList.remove("show");};
document.addEventListener("click",function(e){if(e.target&&e.target.id==="modal")window.hideGuide();});

window.renderPlan=function(){var day=DAYS[S.day];var list=document.getElementById("planList");if(!list)return;
var cur=S.timeline[S.idx]&&S.timeline[S.idx].key;
var curBlock=(S.timeline[S.idx]&&S.timeline[S.idx].block)||1;
function rows(set,label,isActiveSet){
var s='<div class="setlbl">'+label+'</div>';
for(var i=0;i<set.length;i++){var key=resolveKey(day,set[i]);
var act=(isActiveSet&&key===cur)?' active':'';
s+='<div class="plan-item'+act+'"><span class="num">'+(i+1)+'</span><span class="nm">'+exName(key)+'</span><button class="pi" onclick="showGuide(\''+key+'\')">i</button></div>';}
return s;}
var out="";
if(S.len===30&&day.ex2){out+=rows(day.ex,"Blocks 1-3",curBlock<=3);out+=rows(day.ex2,"Blocks 4-6",curBlock>3);}
else{out+=rows(day.ex,"Blocks 1-3",true);}
list.innerHTML=out;};

if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}

build();renderAll();
</script>
</body>
</html>
