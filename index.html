<style>
  :root{--bg:#12160F;--panel:#1B2114;--olive:#4A5A2B;--oliveL:#6B8036;--sand:#C7BFA4;--work:#8FB63C;--rest:#3D6E8C;--prep:#B8912E;--ink:#E6E4D6;--faint:#7C8168;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--ink);font-family:ui-monospace,'SF Mono',Menlo,monospace;overscroll-behavior:none;}
  body{min-height:100vh;min-height:100dvh;user-select:none;}
  .wrap{max-width:440px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 10px) 14px calc(env(safe-area-inset-bottom) + 16px);display:flex;flex-direction:column;min-height:100dvh;}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  h1{font-size:18px;letter-spacing:4px;text-transform:uppercase;color:var(--sand);}
  h1 span{color:var(--work);}
  .streak{font-size:13px;color:var(--work);font-weight:700;}
  .seg{display:flex;gap:5px;background:#000;border:1px solid var(--olive);border-radius:10px;padding:4px;margin-bottom:8px;}
  .seg button{flex:1;background:transparent;color:var(--faint);border:none;border-radius:7px;padding:9px 4px;font:inherit;font-size:11.5px;letter-spacing:.5px;cursor:pointer;text-transform:uppercase;}
  .seg button.on{background:var(--olive);color:var(--ink);font-weight:700;}
  .seg.diff button.on{background:var(--oliveL);color:#0d0f0a;}
  .row2{display:flex;gap:8px;}
  .row2 .seg{flex:1;}
  .dialwrap{position:relative;width:270px;height:270px;margin:8px auto 4px;}
  .dc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .phase{font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:700;}
  .time{font-size:60px;font-weight:700;line-height:1.05;}
  .exname{font-size:15px;text-align:center;color:var(--sand);max-width:210px;min-height:38px;padding:0 6px;}
  .cue{font-size:11.5px;color:var(--faint);text-align:center;max-width:320px;margin:6px auto 0;min-height:28px;line-height:1.35;}
  .next{font-size:11px;text-align:center;color:var(--faint);letter-spacing:.5px;text-transform:uppercase;margin-top:6px;min-height:15px;}
  .bar{width:100%;height:5px;background:#000;border:1px solid var(--olive);border-radius:3px;overflow:hidden;margin:6px 0;}
  .bar>div{height:100%;background:linear-gradient(90deg,var(--oliveL),var(--work));transition:width .4s linear;}
  .controls{display:flex;gap:10px;align-items:center;justify-content:center;margin-top:12px;}
  .btn{background:transparent;color:var(--sand);border:1px solid var(--olive);border-radius:9px;padding:11px 16px;font:inherit;font-size:15px;letter-spacing:.5px;cursor:pointer;}
  .btn:active{transform:translateY(1px);}
  .main{border:none;color:#0d0f0a;border-radius:11px;padding:15px 30px;font-size:17px;font-weight:700;letter-spacing:1px;min-width:150px;box-shadow:0 4px 0 rgba(0,0,0,.4);cursor:pointer;}
  .main:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.4);}
  .reset{display:block;margin:9px auto 0;opacity:.8;font-size:13px;}
  .foot{margin-top:auto;padding-top:12px;font-size:10.5px;color:var(--faint);letter-spacing:1px;text-transform:uppercase;text-align:center;}
  .instal{margin-top:8px;text-align:center;}
  #installBtn{display:none;background:var(--work);color:#0d0f0a;border:none;border-radius:9px;padding:10px 16px;font:inherit;font-weight:700;cursor:pointer;}
  #rotate{position:fixed;inset:0;background:var(--bg);z-index:99;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
  @media (orientation:landscape) and (max-height:500px){#rotate{display:flex;}}

  .exrow{display:flex;align-items:center;justify-content:center;gap:8px;}
  .info-btn{width:22px;height:22px;min-width:22px;border-radius:50%;border:1px solid var(--olive);background:transparent;color:var(--sand);font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-family:serif;font-style:italic;}
  .info-btn:active{transform:scale(.9);}
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:center;justify-content:center;padding:18px;}
  #modal.show{display:flex;}
  .sheet{background:var(--panel);border:1px solid var(--olive);border-radius:16px;max-width:400px;width:100%;max-height:88vh;overflow-y:auto;padding:18px;}
  .sheet h3{color:var(--work);font-size:17px;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
  .sheet .diag{width:100%;height:130px;background:#000;border-radius:10px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;}
  .sheet p{font-size:13px;line-height:1.5;margin-bottom:8px;color:var(--ink);}
  .sheet .lbl{color:var(--oliveL);font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:1px;}
  .sheet .yt{display:block;text-align:center;background:var(--work);color:#0d0f0a;font-weight:700;padding:12px;border-radius:10px;text-decoration:none;margin-top:12px;font-size:14px;}
  .sheet .close{display:block;width:100%;margin-top:8px;background:transparent;border:1px solid var(--olive);color:var(--sand);border-radius:10px;padding:11px;font:inherit;cursor:pointer;}

  .plan{margin-top:14px;background:var(--panel);border:1px solid var(--olive);border-radius:12px;padding:12px;}

t.", "steps": "Press your lower back into the floor and lift shoulders and legs a few inches; hold.", "cues": "Low back stays glued down the whole time.", "avoid": "Low back arching off the floor.", "yt": "hollow hold proper form"}, "bicycle": {"t": "Bicycle Crunch", "setup": "On your back, hands lightly behind head, knees up.", "steps": "Bring one elbow toward the opposite knee while extending the other leg; alternate in a pedaling motion.", "cues": "Rotate through the torso, not the neck. Controlled tempo.", "avoid": "Yanking the head; going too fast.", "yt": "bicycle crunch proper form"}, "climber": {"t": "Mountain Climbers", "setup": "Top of a push-up position, hands under shoulders.", "steps": "Drive one knee toward your chest, then switch quickly, like running in plank.", "cues": "Keep hips level and low; quick but controlled knees.", "avoid": "Hips bouncing high; letting the low back sag.", "yt": "mountain climbers proper form"}, "burpee": {"t": "Burpee", "setup": "Stand tall.", "steps": "Squat, place hands down, jump feet back to plank, (optional push-up), jump feet in, then jump up.", "cues": "Explode on the jump; land soft. Keep a steady rhythm.", "avoid": "Sagging in the plank; crashing the landing.", "yt": "how to do a burpee proper form", "wiki": "https://en.wikipedia.org/wiki/Burpee_(exercise)"}, "superman": {"t": "Superman", "setup": "Lie face-down, arms extended overhead.", "steps": "Lift your chest, arms, and thighs off the floor simultaneously; hold briefly, then lower.", "cues": "Lengthen — reach long rather than cranking up high. Keep neck neutral.", "avoid": "Straining the neck; jerky reps.", "yt": "superman exercise back proper form"}, "catcow": {"t": "Cat-Cow", "setup": "On hands and knees, wrists under shoulders, knees under hips.", "steps": "Arch your back and lift your head (cow), then round your spine and tuck your chin (cat). Flow with breath.", "cues": "Move with your breath; full spinal range.", "avoid": "Rushing; moving only the low back.", "yt": "cat cow stretch proper form"}, "worldg": {"t": "World's Greatest Stretch", "setup": "Start in a lunge, back leg extended.", "steps": "With the front foot flat, place the same-side hand down and rotate the other arm up toward the ceiling; hold, then switch.", "cues": "Open through the chest and hips; follow your hand with your eyes.", "avoid": "Forcing the rotation; letting the back knee slam down.", "yt": "worlds greatest stretch how to"}, "hipflex": {"t": "Hip-Flexor / Couch Stretch", "setup": "Half-kneeling, one knee down, the other foot forward.", "steps": "Tuck your pelvis under and gently shift forward until you feel a stretch in the front of the down-leg hip.", "cues": "Squeeze the glute of the down leg; tall chest.", "avoid": "Arching the low back instead of tucking the pelvis.", "yt": "kneeling hip flexor stretch proper form"}, "pigeon": {"t": "Pigeon / Figure-4", "setup": "Front shin across, back leg extended (pigeon) — or lie on back and cross one ankle over the opposite knee (figure-4).", "steps": "Ease into the stretch and breathe into the glute of the front/crossed leg.", "cues": "Keep it gentle; relax and breathe.", "avoid": "Bouncing; forcing depth.", "yt": "pigeon pose glute stretch how to"}, "hamstr": {"t": "Hamstring Stretch", "setup": "Seated or standing, one leg extended.", "steps": "Hinge at the hips reaching toward the foot until you feel a stretch behind the thigh; hold.", "cues": "Hinge from the hips, keep the back fairly flat.", "avoid": "Rounding hard through the spine to reach further.", "yt": "hamstring stretch proper form"}, "ankle": {"t": "Ankle Mobility", "setup": "Half-kneeling or standing facing a wall, foot a few inches back.", "steps": "Drive your knee forward over your toes toward the wall, keeping the heel down; return.", "cues": "Heel stays planted; knee tracks over the middle toes.", "avoid": "Letting the heel lift.", "yt": "ankle mobility knee to wall drill"}, "breathe": {"t": "Breathing Reset", "setup": "Sit or lie comfortably.", "steps": "Inhale through the nose for 4 counts, exhale slowly for 6; repeat calmly.", "cues": "Breathe into the belly, long relaxed exhale.", "avoid": "Forcing or over-breathing.", "yt": "box breathing technique how to"}, "b_row": {"t": "Band Row", "setup": "Anchor the band at chest height (or loop around your feet seated); hold an end in each hand.", "steps": "Pull the handles toward your ribs, driving the elbows back and squeezing the shoulder blades; return slowly.", "cues": "Lead with the elbows; squeeze the mid-back.", "avoid": "Shrugging; using momentum.", "yt": "resistance band row proper form"}, "b_pull": {"t": "Band Pull-Apart", "setup": "Hold the band with both hands at shoulder height, arms out front.", "steps": "Pull the band apart to your chest by squeezing your shoulder blades; return slowly.", "cues": "Keep arms fairly straight; slow controlled return.", "avoid": "Bending the elbows a lot; snapping back.", "yt": "band pull apart proper form"}, "b_press": {"t": "Band Chest Press", "setup": "Anchor the band behind you at chest height; hold an end in each hand, staggered stance.", "steps": "Press your hands forward to full extension, then control back.", "cues": "Full lockout; control the return.", "avoid": "Letting the band yank your arms back.", "yt": "resistance band chest press proper form"}, "b_squat": {"t": "Band Squat", "setup": "Stand on the band, feet shoulder-width, holding the ends at shoulder height.", "steps": "Squat down, then stand up against the band's resistance.", "cues": "Band adds tension at the top — control it. Knees track toes.", "avoid": "Knees caving; rushing.", "yt": "resistance band squat proper form"}, "b_curl": {"t": "Band Biceps Curl", "setup": "Stand on the band, hold the ends with palms up.", "steps": "Curl your hands toward your shoulders, then lower slowly.", "cues": "Keep elbows pinned to your sides.", "avoid": "Swinging the body; elbows drifting forward.", "yt": "resistance band bicep curl proper form"}, "b_ohp": {"t": "Band Overhead Press", "setup": "Stand on the band, hold the ends at shoulder height.", "steps": "Press your hands overhead to full extension, then lower under control.", "cues": "Ribs down, brace the core, press tall.", "avoid": "Arching the low back to press.", "yt": "resistance band overhead press proper form"}, "p_pull": {"t": "Pull-up", "setup": "Hang from the bar, palms facing away, hands shoulder-width.", "steps": "Pull your chest toward the bar until your chin clears it, then lower under control. Use a band under the feet to assist if needed.", "cues": "Start from a full hang; drive elbows down; no swinging.", "avoid": "Kipping/swinging; partial range.", "yt": "how to do a pull up proper form", "wiki": "https://en.wikipedia.org/wiki/Pull-up"}, "p_chin": {"t": "Chin-up", "setup": "Hang from the bar, palms facing you, shoulder-width.", "steps": "Pull up until your chin clears the bar, then lower slowly. Band-assist if needed.", "cues": "Drive elbows down and back; controlled descent.", "avoid": "Swinging; dropping fast.", "yt": "how to do a chin up proper form", "wiki": "https://en.wikipedia.org/wiki/Pull-up"}, "p_knee": {"t": "Hanging Knee Raise", "setup": "Hang from the bar, shoulders active (not fully relaxed).", "steps": "Raise your knees toward your chest, then lower slowly without swinging.", "cues": "Control the descent; no momentum.", "avoid": "Swinging the legs; using a kip.", "yt": "hanging knee raise proper form"}, "p_scap": {"t": "Scapular Pulls", "setup": "Hang from the bar with straight arms.", "steps": "Without bending the elbows, pull your shoulder blades down and together to raise your body slightly; then relax down.", "cues": "Small range — it's all shoulder blades. Great pull-up prep.", "avoid": "Bending the elbows (that's a pull-up).", "yt": "scapular pulls hang proper form"}, "wideph": {"t": "Wide Push-up", "setup": "Hands wider than shoulder-width, body in a straight line.", "steps": "Lower your chest between your hands, then press back up.", "cues": "Wider hands shift work to the chest. Core braced.", "avoid": "Hands so wide the shoulders strain; sagging hips.", "wiki": "https://en.wikipedia.org/wiki/Push-up"}, "shoulder": {"t": "Plank Shoulder Taps", "setup": "Top of a push-up position, feet hip-width (wider = easier).", "steps": "Lift one hand, tap the opposite shoulder, swap. Keep alternating.", "cues": "Hips stay completely still — that's the point.", "avoid": "Hips rocking side to side; rushing."}, "sqhold": {"t": "Wall Sit", "setup": "Back flat to a wall, slide down until thighs are parallel.", "steps": "Hold with knees at about 90 degrees.", "cues": "Back flat, weight in the heels, breathe steadily.", "avoid": "Sliding up as it burns; knees caving in."}, "stepup": {"t": "Step-up", "setup": "Stand facing a sturdy step, bench or low chair.", "steps": "Step up with one foot, drive through that heel to stand tall, lower under control. Alternate.", "cues": "Drive through the top foot, not the bottom one.", "avoid": "Bouncing off the back foot; crashing down."}, "birddog": {"t": "Bird Dog", "setup": "Hands and knees, wrists under shoulders, knees under hips.", "steps": "Extend opposite arm and leg level with the body, hold, return, switch.", "cues": "Hips square and level — balance a glass on your back.", "avoid": "Twisting hips; arching the low back."}, "reverse": {"t": "Reverse Snow Angels", "setup": "Face-down, arms at your sides, palms down.", "steps": "Lift arms slightly and sweep them overhead and back, staying off the floor.", "cues": "Slow and controlled; squeeze the upper back throughout.", "avoid": "Resting arms on the floor; rushing."}, "legraise": {"t": "Lying Leg Raise", "setup": "On your back, hands beside hips, legs extended.", "steps": "Raise legs toward the ceiling, then lower slowly without arching.", "cues": "Press the low back down throughout. Bend knees to ease it.", "avoid": "Low back arching; dropping the legs fast."}, "jumpsq": {"t": "Squat Jump", "setup": "Feet shoulder-width, quarter-squat.", "steps": "Squat, jump explosively up, land softly and absorb into the next rep.", "cues": "Land soft through the whole foot, knees track toes.", "avoid": "Stiff landings; knees caving in.", "wiki": "https://en.wikipedia.org/wiki/Squat_(exercise)"}};
const DAYS=[
  {name:"Push",ex:["jack","pushup","pike","dips","plank","hollow"],ex2:["jack","wideph","shoulder","dips","legraise","catcow"],sub:{pushup:{band:"b_press"},pike:{band:"b_ohp"},dips:{band:"b_curl"},wideph:{band:"b_press"},shoulder:{band:"b_pull"}}},
  {name:"Legs",ex:["jack","squat","split","glute","calf","side"],ex2:["jack","sqhold","stepup","glute","jumpsq","hipflex"],sub:{squat:{band:"b_squat"},sqhold:{band:"b_squat"},stepup:{band:"b_squat"}}},
  {name:"Recover",ex:["catcow","worldg","pigeon","hamstr","ankle","breathe"],ex2:["catcow","birddog","hipflex","pigeon","hamstr","breathe"],sub:{}},
  {name:"Pull",ex:["jack","superman","plank","hollow","side","catcow"],ex2:["jack","reverse","birddog","legraise","side","catcow"],sub:{superman:{band:"b_row",bar:"p_pull"},plank:{band:"b_pull",bar:"p_scap"},hollow:{bar:"p_knee"},reverse:{band:"b_pull",bar:"p_chin"},legraise:{bar:"p_knee"}}},
  {name:"Power",ex:["jack","burpee","squat","climber","pushup","hollow"],ex2:["jack","jumpsq","stepup","climber","wideph","legraise"],sub:{squat:{band:"b_squat"},pushup:{band:"b_press",bar:"p_chin"},wideph:{band:"b_press",bar:"p_chin"},jumpsq:{band:"b_squat"}}},
  {name:"Core",ex:["jack","plank","side","bicycle","hollow","calf"],ex2:["jack","shoulder","birddog","legraise","side","sqhold"],sub:{hollow:{bar:"p_knee"},legraise:{bar:"p_knee"}}},
  {name:"Mobility",ex:["catcow","worldg","hipflex","pigeon","hamstr","breathe"],ex2:["catcow","birddog","worldg","pigeon","ankle","breathe"],sub:{}}
];
const BLOCKS={15:3,30:6};
const DIFF_WR=[{w:35,r:15},{w:40,r:10},{w:45,r:5}];
const store={get(k,d){try{return JSON.parse(localStorage.getItem("fg_"+k))??d}catch(e){return d}},set(k,v){try{localStorage.setItem("fg_"+k,JSON.stringify(v))}catch(e){}}};
const S={day:new Date().getDay()%7,diff:store.get("diff",1),len:store.get("len",15),equip:store.get("equip","bw"),idx:0,remaining:0,running:false,timeline:[]};
function resolveKey(day,key){const sub=day.sub&&day.sub[key];if(sub&&S.equip!=="bw"&&sub[S.equip])return sub[S.equip];return key;}
function exName(key){return EX[key].v[S.diff];}
function build(){const day=DAYS[S.day];const blocks=BLOCKS[S.len];const wr=DIFF_WR[S.diff];const work=wr.w,rest=wr.r;
  const tl=[{type:"prep",name:"Get ready",seconds:10}];
  for(let b=0;b<blocks;b++){
    const set=(b>=3&&day.ex2)?day.ex2:day.ex;
    set.forEach((slot,i)=>{const key=resolveKey(day,slot);tl.push({type:"work",key,seconds:work,block:b+1});
      const last=(b===blocks-1&&i===set.length-1);if(!last)tl.push({type:"rest",name:"Rest",seconds:rest});});
  }
  tl.push({type:"done",name:"Session complete",seconds:0});S.timeline=tl;S.idx=0;S.remaining=tl[0].seconds;}
const $=id=>document.getElementById(id);
const RC=2*Math.PI*118;$("ring").style.strokeDasharray=RC;
const fmt=s=>Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
function seg(id,attr,val,cb){[...$(id).children].forEach(b=>{b.classList.toggle("on",b.getAttribute(attr)==String(val));b.onclick=()=>cb(b.getAttribute(attr));});}
function renderControls(){const ds=$("daySeg");ds.innerHTML="";
  DAYS.forEach((d,i)=>{const b=document.createElement("button");b.textContent=d.name;if(i===S.day)b.className="on";b.onclick=()=>{S.day=i;stop();build();renderAll();};ds.appendChild(b);});
  seg("diffSeg","data-d",S.diff,v=>{S.diff=+v;store.set("diff",S.diff);stop();build();renderAll();});
  seg("lenSeg","data-len",S.len,v=>{S.len=+v;store.set("len",S.len);stop();build();renderAll();});
  seg("equipSeg","data-e",S.equip,v=>{S.equip=v;store.set("equip",v);stop();build();renderAll();});}
function renderTimer(){const s=S.timeline[S.idx];
  const acc=s.type==="rest"?"var(--rest)":s.type==="prep"?"var(--prep)":"var(--work)";
  $("ring").setAttribute("stroke",acc);$("phase").style.color=acc;
  $("phase").textContent=s.type==="rest"?"Recover":s.type==="prep"?"Standby":s.type==="done"?"Complete":"Work";
  $("time").textContent=fmt(S.remaining);
  if(s.key){$("exname").innerHTML='<span class="exrow"><span>'+exName(s.key)+'</span><button class="info-btn" onclick="showGuide(\''+s.key+'\')">i</button></span>';}else{$("exname").textContent=s.name||"";}
  $("cue").textContent=s.key?EX[s.key].cue:"";
  const nx=S.timeline[S.idx+1];
  $("next").textContent=nx&&nx.type!=="done"?"Next: "+(nx.key?exName(nx.key):nx.name):s.type==="done"?"Great work, Fred.":"Final effort";
  const pct=s.seconds>0?(s.seconds-S.remaining)/s.seconds:1;$("ring").style.strokeDashoffset=RC-pct*RC;
  const tot=S.timeline.reduce((a,x)=>a+x.seconds,0),before=S.timeline.slice(0,S.idx).reduce((a,x)=>a+x.seconds,0);
  $("overall").style.width=Math.min(100,((before+(s.seconds-S.remaining))/tot)*100)+"%";
  const nW=S.timeline.filter(x=>x.type==="work").length,dW=S.timeline.slice(0,S.idx+1).filter(x=>x.type==="work").length;
  var curBlk=s.block||1,totBlk=BLOCKS[S.len];$("foot").textContent="Block "+curBlk+"/"+totBlk+" · "+fmt(tot)+" total · "+["Easy","Standard","Hard"][S.diff]+" · "+S.equip.toUpperCase();
  $("startBtn").textContent=S.running?"❚❚ Pause":"▶ Start";$("startBtn").style.background=acc;$("startBtn").style.opacity=s.type==="done"?.4:1;if(window.renderPlan)window.renderPlan();}
function renderAll(){$("streak").textContent=store.get("streak",0)+"🔥";renderControls();renderTimer();if(window.renderPlan)window.renderPlan();}
function beep(f,d,t,v){f=f||660;d=d||.15;t=t||"square";v=v||.22;try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return;beep.c=beep.c||new A();const c=beep.c;if(c.state==="suspended")c.resume();const o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}
function buzz(p){try{navigator.vibrate&&navigator.vibrate(p);}catch(e){}}
function endSignal(){beep(880,.14,"square",.25);setTimeout(()=>beep(660,.14,"square",.25),150);buzz([120,60,120]);}
function notify(t,b){try{if("Notification"in window&&Notification.permission==="granted")new Notification(t,{body:b});}catch(e){}}
let iv=null;
function tick(){if(S.remaining<=1){const ni=S.idx+1;if(ni>=S.timeline.length)return finish();const ns=S.timeline[ni];if(ns.type==="done")return finish();S.idx=ni;S.remaining=ns.seconds;endSignal();renderTimer();return;}if(S.remaining===4){beep(520,.18,"triangle",.2);buzz(50);}else if(S.remaining<=3){beep(600,.07,"sine",.13);}S.remaining--;renderTimer();}
function start(){if(S.timeline[S.idx].type==="done")build();S.running=true;beep(700,.1,"square",.2);buzz(40);requestWake();if("Notification"in window&&Notification.permission==="default")Notification.requestPermission();clearInterval(iv);iv=setInterval(tick,1000);renderTimer();}
function stop(){S.running=false;clearInterval(iv);releaseWake();renderTimer();}
function finish(){stop();beep(880,.4,"sawtooth",.28);setTimeout(()=>beep(1150,.45,"sawtooth",.28),200);buzz([200,80,200,80,300]);notify("FredsGym","Session complete. Great work, Fred.");const t=new Date().toDateString();if(store.get("lastDone","")!==t){store.set("streak",store.get("streak",0)+1);store.set("lastDone",t);}S.idx=S.timeline.length-1;S.remaining=0;renderAll();}
$("startBtn").onclick=()=>S.running?stop():start();
$("reset").onclick=()=>{stop();build();renderAll();};
$("prev").onclick=()=>{stop();S.idx=Math.max(0,S.idx-1);S.remaining=S.timeline[S.idx].seconds;renderTimer();};
$("skip").onclick=()=>{stop();S.idx=Math.min(S.timeline.length-1,S.idx+1);S.remaining=S.timeline[S.idx].seconds;renderTimer();};
let wl=null;
async function requestWake(){try{if("wakeLock"in navigator)wl=await navigator.wakeLock.request("screen");}catch(e){}}
function releaseWake(){try{wl&&wl.release();wl=null;}catch(e){}}
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"&&S.running)requestWake();});
(async()=>{try{screen.orientation&&screen.orientation.lock&&await screen.orientation.lock("portrait");}catch(e){}})();
let dfd=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dfd=e;const b=$("installBtn");b.style.display="inline-block";b.onclick=async()=>{b.style.display="none";dfd.prompt();await dfd.userChoice;dfd=null;};});
window.diagram=function(key){var f=FIGMAP[key];return (f&&FIG[f])?FIG[f]:FIG['stand'];};
window.showGuide=function(key){var g=GUIDE[key];if(!g)return;
  var html='<h3>'+g.t+'</h3><div class="diag">'+window.diagram(key)+'</div>'+
    '<p><span class="lbl">Setup</span><br>'+g.setup+'</p>'+
    '<p><span class="lbl">How to</span><br>'+g.steps+'</p>'+
    '<p><span class="lbl">Form cues</span><br>'+g.cues+'</p>'+
    '<p><span class="lbl">Avoid</span><br>'+g.avoid+'</p>'+
    (g.wiki?'<a class="yt" href="'+g.wiki+'" target="_blank" rel="noopener">Read on Wikipedia</a>':'')+
    '<button class="close" onclick="hideGuide()">Close</button>';
  document.getElementById("sheet").innerHTML=html;document.getElementById("modal").classList.add("show");
  if(S.running){stop();}};
window.hideGuide=function(){document.getElementById("modal").classList.remove("show");};
document.addEventListener("click",function(e){if(e.target&&e.target.id==="modal")window.hideGuide();});

window.renderPlan=function(){var day=DAYS[S.day];var list=document.getElementById("planList");if(!list)return;
var cur=S.timeline[S.idx]&&S.timeline[S.idx].key;
var curBlock=(S.timeline[S.idx]&&S.timeline[S.idx].block)||1;
function rows(set,label,isActiveSet){
var s='<div class="setlbl">'+label+'</div>';
for(var i=0;i<set.length;i++){var key=resolveKey(day,set[i]);
var act=(isActiveSet&&key===cur)?' active':'';
s+='<div class="plan-item'+act+'"><span class="num">'+(i+1)+'</span><span class="nm">'+exName(key)+'</span><button class="pi" onclick="showGuide(\''+key+'\')">i</button></div>';}
return s;}
var out="";
if(S.len===30&&day.ex2){out+=rows(day.ex,"Blocks 1-3",curBlock<=3);out+=rows(day.ex2,"Blocks 4-6",curBlock>3);}
else{out+=rows(day.ex,"Blocks 1-3",true);}
list.innerHTML=out;};
build();renderAll();
</script>
